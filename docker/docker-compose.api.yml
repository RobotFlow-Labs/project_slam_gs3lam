services:
  gs3lam-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    container_name: gs3lam-api
    ports:
      - "8000:8000"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
